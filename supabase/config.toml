# Supabase local development configuration for TuGPT.ai
project_id = "tugpt-ai"

[api]
enabled = true
port = 56321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 56322
shadow_port = 56320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = false
port = 56323

[local_smtp]
enabled = true
port = 56324


[analytics]
enabled = false
port = 56327

[storage]
enabled = false
file_size_limit = "50MiB"


[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://localhost:56321/auth/v1/callback"
